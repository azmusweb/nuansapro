<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuansa.net - Wawasan Mendalam & Profesional</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f9fafb;
            --text-primary: #111827;
            --text-secondary: #4b5563;
            --accent: #2563eb;
            --border: #e5e7eb;
            --card-bg: #ffffff;
        }

        [data-theme="dark"] {
            --bg-primary: #111827;
            --bg-secondary: #1f2937;
            --text-primary: #f9fafb;
            --text-secondary: #9ca3af;
            --accent: #3b82f6;
            --border: #374151;
            --card-bg: #1f2937;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: background-color 0.3s, color 0.3s;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
        }

        header {
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            background: var(--bg-primary);
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent);
            text-decoration: none;
        }

        .nav-tools {
            display: flex;
            gap: 1.5rem;
            align-items: center;
        }

        button#theme-toggle {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-primary);
        }

        main {
            max-width: 1000px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .hero {
            text-align: center;
            margin-bottom: 4rem;
        }

        .hero h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }

        .hero p {
            color: var(--text-secondary);
            font-size: 1.1rem;
        }

        /* Card Grid */
        #content-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background-color: var(--bg-secondary);
        }

        .card-body {
            padding: 1.5rem;
        }

        .card-tag {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: var(--accent);
            font-weight: 600;
            margin-bottom: 0.5rem;
            display: block;
        }

        .card-title {
            font-size: 1.25rem;
            margin-bottom: 0.75rem;
            font-weight: 700;
        }

        .card-excerpt {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-bottom: 1.5rem;
        }

        .btn-read {
            display: inline-block;
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
        }

        #loading {
            text-align: center;
            padding: 3rem;
        }

        /* Simple Footer */
        footer {
            text-align: center;
            padding: 4rem 1rem;
            border-top: 1px solid var(--border);
            margin-top: 4rem;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>

    <header>
        <a href="#" class="logo">NUANSA</a>
        <div class="nav-tools">
            <button id="theme-toggle" title="Ganti Tema">
                <i data-lucide="moon"></i>
            </button>
        </div>
    </header>

    <main>
        <section class="hero">
            <h1>Eksplorasi Wawasan Tanpa Batas</h1>
            <p>Artikel mendalam, profesional, dan evergreen untuk masa depan yang lebih baik.</p>
        </section>

        <div id="loading">Sedang memuat wawasan terbaru...</div>
        <div id="content-grid"></div>
    </main>

    <footer>
        <p>&copy; 2024 Nuansa.net. Dibuat dengan integritas tinggi.</p>
    </footer>

    <script>
        // CONFIGURATION: Ganti dengan URL Web App Anda dari Google Apps Script
        const API_URL = "URL_WEB_APP_ANDA";

        // Initialize Lucide Icons
        lucide.createIcons();

        // Theme Toggle Logic
        const themeToggle = document.getElementById('theme-toggle');
        const body = document.body;
        
        themeToggle.addEventListener('click', () => {
            const isDark = body.getAttribute('data-theme') === 'dark';
            body.setAttribute('data-theme', isDark ? 'light' : 'dark');
            themeToggle.innerHTML = isDark ? '<i data-lucide="moon"></i>' : '<i data-lucide="sun"></i>';
            lucide.createIcons();
        });

        // Fetch Data from Google Sheets
        async function fetchContent() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                renderContent(data);
            } catch (error) {
                console.error("Gagal mengambil data:", error);
                document.getElementById('loading').innerText = "Gagal memuat konten. Pastikan API URL sudah benar.";
            }
        }

        function renderContent(items) {
            const grid = document.getElementById('content-grid');
            const loader = document.getElementById('loading');
            
            if (items.length === 0) {
                loader.innerText = "Belum ada artikel yang diterbitkan.";
                return;
            }

            loader.style.display = 'none';
            grid.innerHTML = items.map(item => `
                <article class="card">
                    <img src="${item.gambar || 'https://via.placeholder.com/600x400?text=Nuansa'}" alt="${item.judul}">
                    <div class="card-body">
                        <span class="card-tag">${item.kategori || 'Umum'}</span>
                        <h2 class="card-title">${item.judul}</h2>
                        <p class="card-excerpt">${item.meta_deskripsi.substring(0, 120)}...</p>
                        <a href="?p=${item.slug}" class="btn-read">Baca Selengkapnya →</a>
                    </div>
                </article>
            `).join('');
        }

        // Start Fetching
        window.onload = fetchContent;
    </script>
</body>
</html>
