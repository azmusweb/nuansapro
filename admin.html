<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Nuansa CMS</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --sidebar-width: 260px;
            --primary: #2563eb;
            --bg-main: #f3f4f6;
            --text-dark: #1f2937;
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body { background-color: var(--bg-main); display: flex; min-height: 100vh; }

        /* Sidebar Style */
        .sidebar {
            width: var(--sidebar-width);
            background-color: #111827;
            color: white;
            padding: 1.5rem;
            position: fixed;
            height: 100%;
        }

        .sidebar-logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-item {
            padding: 0.75rem 1rem;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            margin-bottom: 0.5rem;
            color: #9ca3af;
            transition: 0.3s;
        }

        .nav-item.active, .nav-item:hover {
            background-color: var(--primary);
            color: white;
        }

        /* Main Content */
        .main-content {
            margin-left: var(--sidebar-width);
            flex: 1;
            padding: 2rem;
        }

        .header-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: white;
            padding: 1.5rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }

        /* Form Styling */
        .editor-container {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }

        .form-group { margin-bottom: 1.5rem; }
        label { display: block; font-weight: 600; margin-bottom: 0.5rem; color: var(--text-dark); }
        input, textarea, select {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 1rem;
        }

        textarea { height: 150px; resize: vertical; }

        .btn-submit {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 0.75rem 2rem;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            font-size: 1rem;
        }

        .btn-submit:hover { opacity: 0.9; }

        .preview-box {
            margin-top: 1rem;
            padding: 1rem;
            background: #f9fafb;
            border: 1px dashed #ccc;
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-logo">
            <i data-lucide="layout-dashboard"></i> NUANSA CMS
        </div>
        <div class="nav-item active"><i data-lucide="plus-circle"></i> Posting Baru</div>
        <div class="nav-item"><i data-lucide="file-text"></i> Semua Artikel</div>
        <div class="nav-item"><i data-lucide="settings"></i> Pengaturan</div>
    </aside>

    <main class="main-content">
        <div class="header-panel">
            <h1>Panel Fullstack WordPress Style</h1>
            <div id="user-info">Admin Mode</div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <small>Total Konten</small>
                <h3>Aktif</h3>
            </div>
            <div class="stat-card">
                <small>Status Database</small>
                <h3 style="color: green;">Terhubung</h3>
            </div>
            <div class="stat-card">
                <small>Mode</small>
                <h3>POSHEET v1.0</h3>
            </div>
        </div>

        <div class="editor-container">
            <h2 style="margin-bottom: 1.5rem;">Tulis Artikel Baru</h2>
            <form id="cmsForm">
                <div class="form-group">
                    <label>Judul Artikel</label>
                    <input type="text" id="judul" placeholder="Contoh: Strategi AI Masa Depan" required>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="form-group">
                        <label>URL Gambar (Bebas Lisensi)</label>
                        <input type="url" id="gambar" placeholder="https://images.unsplash.com/..." required>
                    </div>
                    <div class="form-group">
                        <label>Slug (URL Friendly)</label>
                        <input type="text" id="slug" placeholder="strategi-ai-masa-depan" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Kategori</label>
                    <select id="kategori">
                        <option value="Teknologi">Teknologi</option>
                        <option value="Bisnis">Bisnis</option>
                        <option value="Gaya Hidup">Gaya Hidup</option>
                        <option value="Wawasan">Wawasan</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Meta Deskripsi (SEO)</label>
                    <input type="text" id="meta_deskripsi" placeholder="Ringkasan singkat untuk hasil pencarian Google..." required>
                </div>

                <div class="form-group">
                    <label>Isi Artikel (Format HTML - POSHEET)</label>
                    <textarea id="konten" placeholder="Masukkan kode HTML artikel Anda di sini..." required></textarea>
                </div>

                <button type="submit" class="btn-submit" id="submitBtn">Terbitkan Artikel Sekarang</button>
            </form>
        </div>
    </main>

    <script>
        lucide.createIcons();

        // KONFIGURASI: Menggunakan URL yang Anda berikan
        const API_URL = "https://script.google.com/macros/s/AKfycbwtf3reweTkSYSylrNxBto6_icTTJy4Ap1OfRVPZVMtTEhh6sE-OSCe9fj7_3jqPcHi/exec";

        document.getElementById('cmsForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.innerText = "Mengirim data ke Spreadsheet...";
            submitBtn.disabled = true;

            const payload = {
                judul: document.getElementById('judul').value,
                gambar: document.getElementById('gambar').value,
                slug: document.getElementById('slug').value,
                meta_deskripsi: document.getElementById('meta_deskripsi').value,
                konten: document.getElementById('konten').value,
                kategori: document.getElementById('kategori').value
            };

            try {
                // Menggunakan mode 'no-cors' jika terjadi isu CORS, 
                // tapi API Google Script doPost biasanya butuh pengiriman via fetch standar
                const response = await fetch(API_URL, {
                    method: 'POST',
                    mode: 'no-cors', // Penting untuk Google Apps Script Web App
                    cache: 'no-cache',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                // Karena no-cors tidak bisa membaca body response, 
                // kita asumsikan sukses jika tidak masuk ke catch.
                Swal.fire({
                    title: 'Berhasil!',
                    text: 'Artikel Anda sedang diproses dan akan muncul di database.',
                    icon: 'success',
                    confirmButtonText: 'Mantap'
                });
                
                document.getElementById('cmsForm').reset();

            } catch (error) {
                console.error("Error:", error);
                Swal.fire('Error', 'Terjadi kesalahan saat menghubungi server.', 'error');
            } finally {
                submitBtn.innerText = "Terbitkan Artikel Sekarang";
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
